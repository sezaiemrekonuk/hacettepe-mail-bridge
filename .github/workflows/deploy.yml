name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          envs:     GH_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/opt/hu-mail-bridge
            REPO="https://${GH_TOKEN}@github.com/sezaiemrekonuk/hacettepe-mail-bridge.git"

            # ── Ensure git is installed ──────────────────────────────────────
            if ! command -v git &>/dev/null; then
              apt-get update -qq && apt-get install -y --no-install-recommends git
            fi
            git config --global --add safe.directory "$APP_DIR"

            # ── First-time: initialise git repo ──────────────────────────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git repo found — initialising …"
              cd "$APP_DIR"
              git init -b main
              git remote add origin "$REPO"
            fi

            # ── Always refresh remote URL (token may have changed) ────────────
            cd "$APP_DIR"
            git remote set-url origin "$REPO" 2>/dev/null || git remote add origin "$REPO"

            # ── Pull latest code ─────────────────────────────────────────────
            git fetch --depth=1 origin main
            git checkout -f origin/main
            git branch --set-upstream-to=origin/main main 2>/dev/null || true

            # ── Stamp deploy time (shown in admin panel) ─────────────────────
            mkdir -p "$APP_DIR/data"
            date -u '+%Y-%m-%d %H:%M:%S UTC' > "$APP_DIR/data/last_deploy.txt"

            # ── Rebuild & restart ────────────────────────────────────────────
            docker compose build --pull --no-cache
            docker compose down --remove-orphans
            docker compose up -d

            echo ""
            echo "Deployment complete. Container status:"
            docker compose ps
