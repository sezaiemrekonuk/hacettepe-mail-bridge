services:
  mail-bridge:
    build: .
    container_name: hu-mail-bridge
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      # Chromium persistent sessions per user
      - ./user_data:/app/user_data
      # SQLite database (hub.db)
      - ./data:/app/data

    # Chromium needs /dev/shm larger than the Docker default 64 MB
    shm_size: "256mb"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
